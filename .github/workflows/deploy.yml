name: Deploy to Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:        # adds a manual "Run workflow" button in the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Lightsail via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e

            echo "📦 Pulling latest code..."
            cd /var/www/gharkamali
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Installing dependencies..."
            npm install --production

            echo "🔄 Creating log directory if needed..."
            sudo mkdir -p /var/log/gharkamali
            sudo chown -R ubuntu:ubuntu /var/log/gharkamali

            echo "♻️  Restarting app..."
            pm2 restart gharkamali-backend || pm2 start ecosystem.config.js
            pm2 save

            echo "🩺 Health check..."
            sleep 5
            if curl -fsS http://localhost:3000/api-docs > /dev/null; then
              echo "✅ App responding on :3000"
            else
              echo "❌ App not responding — check 'pm2 logs gharkamali-backend'"
              pm2 logs gharkamali-backend --lines 30 --nostream
              exit 1
            fi

            echo "✅ Deployment complete!"
